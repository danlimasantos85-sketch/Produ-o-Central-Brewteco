<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planejamento de Produção e Romaneio</title>
    <!-- html2pdf CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2, h3 {
            color: #0056b3;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #004085;
        }
        .btn-pdf {
            background-color: #28a745;
            margin-top: 15px;
        }
        .btn-pdf:hover {
            background-color: #218838;
        }
        #area-romaneio {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .text-left {
            text-align: left;
        }
        .destaque-producao {
            font-weight: bold;
            color: #d9534f;
            background-color: #fdf7f7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Planejamento de Demanda e Produção</h2>
    
    <!-- Formulário de Entrada -->
    <div class="form-row">
        <div class="form-group">
            <label for="produto">Item / Produto:</label>
            <input type="text" id="produto" placeholder="Ex: Hambúrguer Bovino">
        </div>
        <div class="form-group">
            <label for="qtd-vendida">Qtde Vendidas:</label>
            <input type="number" id="qtd-vendida" value="0" min="0">
        </div>
        <div class="form-group">
            <label for="romaneio">Romaneio (Entrada/Estoque):</label>
            <input type="number" id="romaneio" value="0" min="0">
        </div>
        <div class="form-group">
            <label for="margem-ajuste">Margem Ajustada (%):</label>
            <input type="number" id="margem-ajuste" value="10" min="0" placeholder="Ex: 10 para +10%">
        </div>
    </div>
    
    <button onclick="adicionarAoPlanejamento()">Calcular e Adicionar à Lista</button>

    <!-- Área de Exportação do PDF -->
    <div id="area-romaneio">
        <h3>Ordem de Produção e Romaneio Consolidado</h3>
        <p><strong>Data de Emissão:</strong> <span id="data-emissao">-</span></p>
        
        <table>
            <thead>
                <tr>
                    <th class="text-left">Item / Produto</th>
                    <th>QTDE VENDIDAS</th>
                    <th>ROMANEIO</th>
                    <th>MARGEM AJUSTADA</th>
                    <th class="destaque-producao">PRODUÇÃO REQUERIDA</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                <!-- Linhas inseridas dinamicamente -->
            </tbody>
        </table>
    </div>

    <!-- Botão de Exportação -->
    <button class="btn-pdf" onclick="exportarParaPDF()">Exportar Romaneio em PDF</button>
</div>

<script>
    let itensPlanejamento = [];

    // Define a data atual na interface
    document.getElementById('data-emissao').innerText = new Date().toLocaleDateString('pt-BR');

    function adicionarAoPlanejamento() {
        const produto = document.getElementById('produto').value || "Item Sem Nome";
        const qtdVendida = parseFloat(document.getElementById('qtd-vendida').value) || 0;
        const romaneio = parseFloat(document.getElementById('romaneio').value) || 0;
        const margemAjuste = parseFloat(document.getElementById('margem-ajuste').value) || 0;

        // Nova Lógica: Soma a quantidade vendida e as entradas do romaneio
        const somaBase = qtdVendida + romaneio;
        
        // Aplica a margem ajustada em cima dessa soma para obter o total a produzir
        // Exemplo: se der 100 itens e a margem for 10%, produção = 110.
        const producaoRequerida = somaBase * (1 + (margemAjuste / 100));

        const novoItem = {
            produto,
            qtdVendida,
            romaneio,
            margemAjuste,
            producaoRequerida: Math.ceil(producaoRequerida) // Arredonda para cima (unidades inteiras)
        };

        itensPlanejamento.push(novoItem);

        renderizarTabela();
        limparCampos();
    }

    function renderizarTabela() {
        const tbody = document.getElementById('corpo-tabela');
        tbody.innerHTML = "";

        itensPlanejamento.forEach(item => {
            const linha = `<tr>
                <td class="text-left"><strong>${item.produto}</strong></td>
                <td>${item.qtdVendida}</td>
                <td>${item.romaneio}</td>
                <td>${item.margemAjuste}%</td>
                <td class="destaque-producao">${item.producaoRequerida}</td>
            </tr>`;
            tbody.innerHTML += linha;
        });
    }

    function limparCampos() {
        document.getElementById('produto').value = "";
        document.getElementById('qtd-vendida').value = "0";
        document.getElementById('romaneio').value = "0";
        document.getElementById('margem-ajuste').value = "10";
    }

    function exportarParaPDF() {
        const elemento = document.getElementById('area-romaneio');
        
        const opcoes = {
            margin:       12,
            filename:     'planejamento-producao.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opcoes).from(elemento).save();
    }
</script>

</body>
</html>
